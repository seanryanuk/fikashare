name: Build FikaShare Cross-Platform Executables

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Executable with PyInstaller
        run: |
          python build.py

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FikaShare-${{ runner.os }}
          path: dist/FikaShare

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: FikaShare-Windows
          path: FikaShare-Windows

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: FikaShare-Linux
          path: FikaShare-Linux

      - name: Package Archives for Release
        run: |
          zip -r FikaShare-Windows.zip FikaShare-Windows
          tar -czvf FikaShare-Linux.tar.gz FikaShare-Linux

      - name: Publish Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: |
            FikaShare-Windows.zip
            FikaShare-Linux.tar.gz
          draft: false
          prerelease: false
